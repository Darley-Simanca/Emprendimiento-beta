<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lenny</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

  <canvas id="heart" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById("heart");
    const ctx = canvas.getContext("2d");

    //dibujar rosa
    ctx.fillStyle = "hotpink";
    ctx.beginPath();
    ctx.arc(250, 250, 80, 0, Math.PI * 2);
    ctx.fill();

    //ajustamos el tamaño del canvas en la pantalla//
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    //variables del control de la animacion//
    let i = 0;
    const maxSteps = 600;

    //centrar el dibujo
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const scale = 15;

    //dibujo en bucle
    function draw() {
      if (i >= maxSteps) {
        let t = i / 20;
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        let drawX = centerX + (x * scale);
        let drawY = centerY + (y * scale);

        ctx.fillStyle = "hotpink";
        ctx.font = "8px Arial";
        ctx.textAlign = "center";

        if (i % 5 == 0) {
          ctx.fillText("i love you", drawX, drawY);
        }
        i++;
        requestAnimationFrame(draw);
      }
    }
    draw();
  </script>
</body>

</html>
